name: Sync IDL to PAM Platform

on:
  push:
    branches:
      - '**'
  delete:
  workflow_dispatch:

jobs:
  notify-pam:
    if: github.event_name != 'delete'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ossutil
        run: |
          curl -fsSL "https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil64" -o /tmp/ossutil64
          chmod +x /tmp/ossutil64
          sudo mv /tmp/ossutil64 /usr/local/bin/ossutil64

      - name: Upload IDL to OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_PREFIX: ${{ vars.OSS_PREFIX || 'idl' }}
          PAM_IDL_OSS_REPO_NAME: ${{ vars.PAM_IDL_OSS_REPO_NAME || 'pam-idl' }}
        run: |
          if [ -z "$OSS_ACCESS_KEY_ID" ] || [ -z "$OSS_ACCESS_KEY_SECRET" ] || [ -z "$OSS_ENDPOINT" ] || [ -z "$OSS_BUCKET" ]; then
            echo "OSS credentials, endpoint or bucket secret is not set"
            exit 1
          fi

          ossutil64 config -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" -L CH

          BRANCH=$(node -e "console.log(encodeURIComponent(process.env.GITHUB_REF_NAME))")
          DEST="oss://${OSS_BUCKET}/${OSS_PREFIX}/${PAM_IDL_OSS_REPO_NAME}/${BRANCH}"

          node <<'NODE'
          const fs = require('fs');
          const payload = {
            commit: process.env.GITHUB_SHA,
            branch: process.env.GITHUB_REF_NAME,
            generatedAt: new Date().toISOString(),
          };
          fs.writeFileSync('/tmp/pam-idl-meta.json', JSON.stringify(payload));
          NODE

          echo "Uploading IDL to $DEST ..."
          ossutil64 sync ./ "$DEST/" --include "idl/*.thrift" --delete -f
          ossutil64 cp /tmp/pam-idl-meta.json "$DEST/_meta.json" -f

      - name: Trigger PAM platform OSS sync
        env:
          PAM_PLATFORM_URL: ${{ secrets.PAM_PLATFORM_URL }}
          PAM_SYNC_TOKEN: ${{ secrets.PAM_SYNC_TOKEN }}
        run: |
          if [ -z "$PAM_PLATFORM_URL" ]; then
            echo "PAM_PLATFORM_URL secret is not set"
            exit 1
          fi

          echo "Triggering PAM platform to sync all IDL branches..."
          HTTP_CODE=$(curl -sS -o /tmp/pam-sync-resp.json -w "%{http_code}" \
            -X POST "$PAM_PLATFORM_URL/api/idl/git-sync" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $PAM_SYNC_TOKEN")

          echo "Trigger response ($HTTP_CODE):"
          cat /tmp/pam-sync-resp.json
          echo ""

          # The platform runs the sync in the background and returns 202 Accepted.
          # We only need to confirm the trigger was accepted; the actual sync
          # runs asynchronously on the platform and is not awaited here.
          if [ "$HTTP_CODE" != "202" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "PAM sync trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "PAM sync triggered successfully (running asynchronously on the platform)."

  cleanup-deleted-branch:
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Install ossutil
        run: |
          curl -fsSL "https://gosspublic.alicdn.com/ossutil/1.7.19/ossutil64" -o /tmp/ossutil64
          chmod +x /tmp/ossutil64
          sudo mv /tmp/ossutil64 /usr/local/bin/ossutil64

      - name: Delete IDL branch from OSS
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_PREFIX: ${{ vars.OSS_PREFIX || 'idl' }}
          PAM_IDL_OSS_REPO_NAME: ${{ vars.PAM_IDL_OSS_REPO_NAME || 'pam-idl' }}
          RAW_BRANCH: ${{ github.event.ref }}
        run: |
          if [ -z "$OSS_ACCESS_KEY_ID" ] || [ -z "$OSS_ACCESS_KEY_SECRET" ] || [ -z "$OSS_ENDPOINT" ] || [ -z "$OSS_BUCKET" ]; then
            echo "OSS credentials, endpoint or bucket secret is not set"
            exit 1
          fi

          ossutil64 config -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET" -L CH

          BRANCH=$(node -e "console.log(encodeURIComponent(process.env.RAW_BRANCH))")
          DEST="oss://${OSS_BUCKET}/${OSS_PREFIX}/${PAM_IDL_OSS_REPO_NAME}/${BRANCH}/"
          echo "Deleting IDL branch from $DEST ..."
          ossutil64 rm "$DEST" -r -f || true

      - name: Trigger PAM platform OSS sync
        env:
          PAM_PLATFORM_URL: ${{ secrets.PAM_PLATFORM_URL }}
          PAM_SYNC_TOKEN: ${{ secrets.PAM_SYNC_TOKEN }}
        run: |
          if [ -z "$PAM_PLATFORM_URL" ]; then
            echo "PAM_PLATFORM_URL secret is not set"
            exit 1
          fi

          echo "Triggering PAM platform after branch deletion..."
          HTTP_CODE=$(curl -sS -o /tmp/pam-sync-resp.json -w "%{http_code}" \
            -X POST "$PAM_PLATFORM_URL/api/idl/git-sync" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $PAM_SYNC_TOKEN")

          echo "Trigger response ($HTTP_CODE):"
          cat /tmp/pam-sync-resp.json
          echo ""

          if [ "$HTTP_CODE" != "202" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "PAM sync trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "PAM sync triggered successfully (running asynchronously on the platform)."
